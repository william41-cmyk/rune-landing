<!DOCTYPE html>

  .nav-links { display: flex; gap: 20px; align-items: center; }
  .nav-link { color: #999; font-size: 14px; text-decoration: none; }
  .nav-btn { background: #e6e6e6; color: #171717; border: none; padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; }
</style>
